<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Los Bros</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='comment-user.png') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>

  <div class="page-wrapper">
    <main class="card" id="main-card">

      <header class="card__header">
        <h1 class="card__title">LOS BROS</h1>
        <p class="card__subtitle">
          Envio de emails utilizando os serviços de: brooker (rabbitMQ) e gerenciador de configuração (zookeeper)
        </p>
      </header>

      <form
        class="email-form"
        hx-post="/send-email"
        hx-target="#feedback"
        hx-swap="innerHTML"
        hx-indicator="#spinner"
        id="email-form"
      >

        <div class="form-group form-group--recipient">
          <div class="avatar" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
          </div>

          <div class="input-wrapper">
            <label class="input-label" for="recipient">DESTINATÁRIO DO EMAIL</label>
            <input
              class="input-field"
              type="email"
              id="recipient"
              name="recipient"
              placeholder="..."
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group form-group--body" style="margin-top: -0.25rem;">
          <div class="input-wrapper">
            <label class="input-label" for="subject">ASSUNTO</label>
            <input
              class="input-field"
              type="text"
              id="subject"
              name="subject"
              placeholder="..."
              required
            />
          </div>
        </div>

        <div class="form-group form-group--body">
          <div class="input-wrapper">
            <label class="input-label" for="body">CORPO DO EMAIL</label>
            <textarea
              class="input-field textarea-field"
              id="body"
              name="body"
              placeholder="..."
              required
              rows="5"
            ></textarea>
          </div>
        </div>

        <div class="form-footer">
          <div id="feedback" class="feedback" aria-live="polite"></div>
          <span id="spinner" class="spinner htmx-indicator" aria-label="Enviando..."></span>
          <button class="btn-send" type="submit" id="send-btn">
            Enviar Email :)
          </button>
        </div>

      </form>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
