events {}

http {
    upstream frontend_pool {
        server frontend:8080;
    }

    upstream backend_pool {
        server backend:5000;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://frontend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 5000;

        location / {
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}